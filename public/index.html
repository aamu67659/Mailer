<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Bulk Mailer</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --border-color: #e2e8f0;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            width: 100%;
            max-width: 600px;
        }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--primary-color); }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-weight: 500; margin-bottom: 0.25rem; }
        input, textarea {
            width: 100%;
            padding: 0.625rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 0.875rem;
        }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            padding: 0.75rem;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 1rem;
        }
        button:hover { background-color: #1d4ed8; }
        button:disabled { background-color: #94a3b8; cursor: not-allowed; }
        #status {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            display: none;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
        }
        .progress-bar {
            height: 8px;
            width: 100%;
            background: #e2e8f0;
            border-radius: 4px;
            margin-top: 1rem;
            display: none;
        }
        .progress-fill {
            height: 100%;
            background: var(--primary-color);
            width: 0%;
            border-radius: 4px;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bulk Email Notification System</h1>
        <form id="mailerForm">
            <div class="grid">
                <div class="form-group">
                    <label>Sender Name</label>
                    <input type="text" id="senderName" placeholder="Zencoder Admin" required>
                </div>
                <div class="form-group">
                    <label>Email Subject</label>
                    <input type="text" id="subject" placeholder="Important Notification" required>
                </div>
            </div>

            <div class="form-group">
                <label>Email List (one per line or comma separated)</label>
                <textarea id="emails" rows="4" placeholder="user1@example.com, user2@example.com" required></textarea>
            </div>

            <div class="form-group">
                <label>Email Content (Plain Text)</label>
                <textarea id="message" rows="5" placeholder="Your message here..." required></textarea>
            </div>

            <div class="grid">
                <div class="form-group">
                    <label>Delay between emails (ms)</label>
                    <input type="number" id="emailDelay" value="1000" min="0">
                </div>
                <div class="form-group">
                    <label>Pause after X emails</label>
                    <input type="number" id="pauseAfter" value="10" min="1">
                </div>
            </div>

            <div class="form-group">
                <label>Auto Pause Duration (ms)</label>
                <input type="number" id="pauseDuration" value="5000" min="0">
            </div>

            <button type="submit" id="submitBtn">Send Bulk Emails</button>
        </form>

        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div id="status"></div>
    </div>

    <script>
        const form = document.getElementById('mailerForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusDiv = document.getElementById('status');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const emailText = document.getElementById('emails').value;
            const emails = emailText.split(/[\n,]+/).map(e => e.trim()).filter(e => e !== '');
            
            if (emails.length === 0) {
                alert('Please enter at least one email address.');
                return;
            }

            const data = {
                senderName: document.getElementById('senderName').value,
                subject: document.getElementById('subject').value,
                message: document.getElementById('message').value,
                emails: emails,
                emailDelay: parseInt(document.getElementById('emailDelay').value),
                pauseAfter: parseInt(document.getElementById('pauseAfter').value),
                pauseDuration: parseInt(document.getElementById('pauseDuration').value)
            };

            submitBtn.disabled = true;
            statusDiv.style.display = 'block';
            statusDiv.textContent = 'Starting process...';
            progressBar.style.display = 'block';
            progressFill.style.width = '0%';

            try {
                const response = await fetch('/api/send-bulk', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    statusDiv.textContent = `Completed!\nTotal Sent: ${result.totalSent}\n\nDetails:\n` + 
                        result.results.map(r => `${r.email}: ${r.status}${r.error ? ' (' + r.error + ')' : ''}`).join('\n');
                    progressFill.style.width = '100%';
                } else {
                    statusDiv.textContent = `Error: ${result.error || 'Unknown error occurred'}`;
                }
            } catch (error) {
                statusDiv.textContent = `Error: ${error.message}`;
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
